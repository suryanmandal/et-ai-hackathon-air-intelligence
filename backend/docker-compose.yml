services:
  db:
    image: postgis/postgis:16-3.4
    container_name: vayusense-postgis
    environment:
      POSTGRES_DB: vayusense
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret_hackathon_key
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgis_data:
